mode: standard-high
description: Higher-stakes single pass with dedicated planning and self-sweep before verification
phases:
  - name: understand
    type: understand
    cognition: exec_decision_memo
    model: planner          # high-tier model alias fills this seat
    max_turns: 20
    output_contract:
      scope: string
      done_criteria: [string]

  - name: plan
    type: plan
    cognition: exec_decision_memo
    model: planner
    max_turns: 20
    handoff_in: understand
    output_contract:
      approach: string
      steps: [object]

  - name: execute
    type: execute
    cognition: senior_engineer_debug
    model: executor         # caller by default
    max_turns: 40
    handoff_in: plan
    output_contract:
      result: string
      artifacts: [string]

  - name: self_sweep
    type: analyze
    cognition: code_review
    model: planner          # high-tier reviews own work
    max_turns: 20
    handoff_in: execute
    output_contract:
      issues_found: [string]
      verdict: pass|fail

  - name: verify
    type: test
    cognition: code_review
    model: verifier
    max_turns: 20
    handoff_in: [execute, self_sweep]
    output_contract:
      verdict: pass|fail
      evidence: [string]
