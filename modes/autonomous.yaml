mode: autonomous
description: Caller-preserving execution loop — runs until done or blocked
phases:
  - name: understand
    type: understand
    cognition: exec_decision_memo
    model: caller
    max_turns: 20
    output_contract:
      goal_understood: string
      done_criteria: [string]

  - name: execute
    type: execute
    cognition: senior_engineer_debug
    model: caller
    max_turns: 80
    handoff_in: understand
    loop_until:
      field: status
      value: complete
    output_contract:
      status: complete|needs_more_work|blocked
      result: string
      artifacts: [string]

  - name: verify
    type: test
    cognition: code_review
    model: caller
    max_turns: 20
    handoff_in: execute
    output_contract:
      verdict: pass|fail
      evidence: [string]
      commands_run:
        - command: string
          exit_code: number
          stdout_excerpt: string
      files_checked: [string]
      residual_risk: [string]
