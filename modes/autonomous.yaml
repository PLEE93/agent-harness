mode: autonomous
description: "Source-derived autonomous Aurelius workflow shape: every phase uses the caller-selected model."
phases:
  - name: understand
    type: understand
    cognition: exec_decision_memo
    model: caller
    max_turns: 20
    output_contract:
      goal_understood: string
      done_criteria: [string]

  - name: plan
    type: plan
    cognition: exec_decision_memo
    model: caller
    max_turns: 20
    handoff_in: understand
    output_contract:
      architecture: object
      sequence: [object]
      risks: [object]

  - name: execute
    type: execute
    cognition: senior_engineer_debug
    model: caller
    max_turns: 80
    handoff_in: plan
    loop_until:
      field: status
      value: complete
    output_contract:
      status: complete|needs_more_work|blocked
      result: string
      artifacts: [string]

  - name: verify
    type: test
    cognition: code_review
    model: caller
    max_turns: 20
    handoff_in: execute
    output_contract:
      verdict: pass|fail
      evidence: [string]
      commands_run: [object]
      files_checked: [string]
      residual_risk: [string]

  - name: red_team
    type: red_team
    cognition: code_review
    model: caller
    max_turns: 20
    handoff_in: [execute, verify]
    output_contract:
      vulnerabilities_found: [object]
      ship_verdict: SAFE_TO_SHIP|FIX_FIRST|RECONSIDER

  - name: synthesize
    type: synthesize
    cognition: exec_decision_memo
    model: caller
    max_turns: 20
    handoff_in: [execute, verify, red_team]
    output_contract:
      plain_language_summary: string
      key_takeaways: [string]
